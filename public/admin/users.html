<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin · Usuarios</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .admin-wrap{max-width:1100px;margin:2rem auto;padding:1rem}
    .toolbar{display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem}
    .toolbar input{flex:1}
    .filters{
      display:grid;
      grid-template-columns: 1fr 180px 160px 120px;
      gap:.5rem;
      align-items: end;
      margin: .5rem 0 1rem;
    }
    .filters .form-group label{font-size:.82rem;color:#64748b;margin-bottom:.25rem;display:block}
    table{width:100%;border-collapse:separate;border-spacing:0 .5rem}
    td,th{padding:.6rem .8rem;background:#fff}
    th{color:#334155;text-align:left}
    td:first-child,th:first-child{border-top-left-radius:10px;border-bottom-left-radius:10px}
    td:last-child,th:last-child{border-top-right-radius:10px;border-bottom-right-radius:10px}
    .muted-sm{color:#64748b;font-size:.85rem}
    .pagination{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
    .pagination button{min-width:2.25rem}
    .right{text-align:right}
    .role-pill{padding:.2rem .6rem;border-radius:999px;font-size:.75rem;background:#e2e8f0;color:#1e293b}
    .btn-danger{background:#dc2626;color:#fff}
    .btn-danger:hover{filter:brightness(.95)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
    .edit-section{margin-top:1rem;padding-top:.75rem;border-top:1px solid #e2e8f0}
    .edit-section h4{margin:0 0 .6rem;color:#334155}
    dialog .input { width: 100%; }
    dialog label { display:block; }
    .designs-published{color:#16a34a;font-weight:600}
    .designs-unpublished{color:#dc2626;font-weight:600}

  </style>
</head>
<body>
<header class="site-header">
  <div class="container nav">
    <a class="brand" href="/"><img src="/img/logo.png" alt="Logo"/></a>
    <nav class="menu">
      <a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="/admin/designs.html"><i class="fa-solid fa-palette"></i> Diseños</a>
    </nav>
  </div>
</header>

<main class="admin-wrap">
  <h1>Panel admin · Usuarios</h1>

    <nav class="admin-subnav">
      <a href="/admin/designs.html" class="tab"><i class="fa-solid fa-palette"></i> Diseños</a>
      <a href="/admin/users.html"   class="tab active"><i class="fa-solid fa-users-gear"></i> Usuarios</a>
      <a href="/admin/products.html" class="tab"><i class="fa-solid fa-store"></i> Productos</a>
      <a href="/admin/orders.html" class="tab"><i class="fa-solid fa-bag-shopping"></i> Pedidos</a>
    </nav>


  <!-- Buscador rápido -->
  <div class="toolbar">
    <input id="q" type="search" class="input" placeholder="Buscar por email, alias, nombre o DNI…"/>
    <button id="btnSearch" class="btn"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
    <span id="resultInfo" class="muted-sm"></span>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <div class="form-group">
      <label for="fRole">Rol</label>
      <select id="fRole" class="input">
        <option value="">Todos</option>
        <option value="admin">Admin</option>
        <option value="designer">Diseñador</option>
        <option value="buyer">Comprador</option>
      </select>
    </div>
    <div class="form-group">
      <label for="fSort">Ordenar por</label>
      <select id="fSort" class="input">
        <option value="newest">Más nuevos</option>
        <option value="oldest">Más antiguos</option>
        <option value="name_asc">Nombre A–Z</option>
        <option value="name_desc">Nombre Z–A</option>
      </select>
    </div>
    <div class="form-group">
      <label for="fLimit">Por página</label>
      <select id="fLimit" class="input">
        <option>10</option>
        <option>20</option>
        <option>30</option>
        <option>50</option>
      </select>
    </div>
    <div class="form-group">
      <label>&nbsp;</label>
      <button id="btnClear" class="btn btn-outline"><i class="fa-solid fa-eraser"></i> Limpiar</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Alias</th>
          <th>Email</th>
          <th>Diseños</th>
          <th>Rol</th>
          <th>Alta</th>
          <th class="right">Acciones</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prev" class="btn">←</button>
    <span id="pageInfo" class="muted-sm"></span>
    <button id="next" class="btn">→</button>
  </div>

  <!-- Modal: Editar -->
<dialog id="modal">
  <form id="formEdit" method="dialog" class="card" style="padding:1rem;min-width:min(860px,95vw);max-height:90vh;overflow:auto">
    <h3>Editar usuario</h3>
    <input type="hidden" name="id"/>

    <div class="grid-2">
      <label>Nombre
        <input class="input" type="text" name="first_name" minlength="2" maxlength="80" />
      </label>
      <label>Apellido
        <input class="input" type="text" name="last_name" minlength="2" maxlength="80" />
      </label>
    </div>

    <div class="grid-2">
      <label>DNI
        <input class="input" type="text" name="dni" inputmode="numeric" maxlength="8" />
      </label>
      <label>Email
        <input class="input" type="email" name="email" />
      </label>
    </div>

    <div class="grid-2">
      <label>Alias (username)
        <input class="input" type="text" name="username" minlength="3" maxlength="30" />
      </label>
      <label>Rol
        <select class="input" name="role" required>
          <option value="buyer">Comprador</option>
          <option value="designer">Diseñador</option>
          <option value="admin">Admin</option>
        </select>
      </label>
    </div>

    <div class="grid-2">
        <label>Preferencia de uso
          <select class="input" name="use_preference" required>
            <option value="buy">Comprar</option>
          <option value="upload">Subir diseños</option>
          </select>
        </label>
      <label>Estado
        <select class="input" name="banned">
          <option value="false">Activo</option>
          <option value="true">Baneado</option>
        </select>
      </label>
    </div>

    <label id="banReasonWrap">Motivo de baneo
      <input class="input" type="text" name="banned_reason" maxlength="240" />
    </label>

    <section class="edit-section">
      <h4>Direccion de contacto, facturacion y envio</h4>
      <div class="grid-2">
        <label>Telefono / WhatsApp
          <input class="input" type="tel" name="phone" inputmode="numeric" maxlength="14" />
          <span class="muted-sm">10 digitos, con codigo de area, sin 0 ni 15.</span>
        </label>
        <label>Pais
          <input class="input" type="text" name="country" maxlength="80" />
        </label>
      </div>
      <div class="grid-2">
        <label>Provincia
          <select class="input" name="province" required>
            <option value="">Selecciona una provincia</option>
            <option>Buenos Aires</option>
            <option>Catamarca</option>
            <option>Chaco</option>
            <option>Chubut</option>
            <option>Ciudad Autonoma de Buenos Aires</option>
            <option>Cordoba</option>
            <option>Corrientes</option>
            <option>Entre Rios</option>
            <option>Formosa</option>
            <option>Jujuy</option>
            <option>La Pampa</option>
            <option>La Rioja</option>
            <option>Mendoza</option>
            <option>Misiones</option>
            <option>Neuquen</option>
            <option>Rio Negro</option>
            <option>Salta</option>
            <option>San Juan</option>
            <option>San Luis</option>
            <option>Santa Cruz</option>
            <option>Santa Fe</option>
            <option>Santiago del Estero</option>
            <option>Tierra del Fuego</option>
            <option>Tucuman</option>
          </select>
        </label>
        <label>Localidad / Ciudad
          <input class="input" type="text" name="city" maxlength="80" />
        </label>
      </div>
      <div class="grid-3">
        <label>Calle
          <input class="input" type="text" name="street" maxlength="120" />
        </label>
        <label>Altura / Numero
          <input class="input" type="text" name="street_number" maxlength="20" />
        </label>
        <label>Codigo postal
          <input class="input" type="text" name="postal_code" maxlength="8" />
          <span class="muted-sm">4 numeros o formato A1234ABC.</span>
        </label>
      </div>
      <div class="grid-2">
        <label>Piso / Depto / Casa
          <input class="input" type="text" name="floor_apartment" maxlength="80" />
        </label>
        <label>Referencias
          <textarea class="input" name="notes" rows="2" maxlength="240"></textarea>
        </label>
      </div>
    </section>

    <section class="edit-section">
      <h4>Datos de cobro del diseñador</h4>
      <div class="grid-2">
        <label>Alias bancario / billetera
          <input class="input" type="text" name="payout_alias" maxlength="30" />
        </label>
        <label>CBU / CVU
          <input class="input" type="text" name="payout_cbu" inputmode="numeric" maxlength="22" />
        </label>
      </div>
    </section>

    <div id="msg" class="muted-sm" style="margin-top:.5rem"></div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">
      <button type="button" id="btnClose" class="btn">Cancelar</button>
      <button class="btn-primary">Guardar</button>
    </div>
  </form>
</dialog>



</main>

<footer class="site-footer">
  <div class="container footer-grid">
    <p>© 2025 Ludus Stamps. Todos los derechos reservados.</p>
    <p><a class="link" href="#contacto">Contacto</a></p>
  </div>
</footer>

<script src="/js/auth-ui.js" defer></script>
<script src="/js/admin-users.js" defer></script>
<script>
  (function(){
    const here = location.pathname.replace(/\/+$/, "");
    document.querySelectorAll(".admin-subnav .tab").forEach(a => {
      const href = a.getAttribute("href").replace(/\/+$/, "");
      if (href === here) a.classList.add("active");
    });
  })();
</script>
</body>
</html>
