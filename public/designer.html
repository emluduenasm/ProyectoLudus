<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Perfil de diseñador · Ludus Stamps</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .designer-wrap{max-width:1100px;margin:1.5rem auto;padding:0 16px}
    .designer-hero{display:grid;gap:1.1rem;grid-template-columns:minmax(170px,220px) 1fr;background:#fff;border-radius:16px;padding:1.2rem;box-shadow:var(--shadow-sm,0 2px 10px rgba(2,6,23,.06));align-items:center}
    @media(max-width:760px){.designer-hero{grid-template-columns:1fr;text-align:center}}
    .designer-avatar{width:170px;max-width:100%;aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#e2e8f0;margin:0 auto}
    .designer-avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .designer-meta{display:flex;flex-direction:column;gap:.55rem}
    .designer-meta h1{margin:0;font-size:1.8rem;line-height:1.05}
    .designer-meta p{margin:.15rem 0 0}
    .designer-stats{display:flex;flex-wrap:wrap;gap:.6rem;font-size:.9rem;color:#475569}
    .designer-stats span{display:inline-flex;align-items:center;gap:.35rem;background:#f1f5f9;padding:.4rem .7rem;border-radius:999px;font-weight:600}
    .designer-designs{margin-top:1.2rem}
    .designer-designs h2{margin:.2rem 0}
    .designer-designs-head{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem}
    .filters-card{background:#fff;padding:16px 18px;border-radius:14px;box-shadow:var(--shadow-sm,0 2px 10px rgba(2,6,23,.06));display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:1rem}
    .filters-card .field{display:flex;flex-direction:column;gap:6px;min-width:180px;flex:1}
    .filters-card .field.half{flex:0 1 150px}
    .filters-card .field label{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.35px;margin:0}
    .filters-card input[type="search"],.filters-card select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #cbd5f5;background:#f8fafc;font-size:14px;color:var(--ink,#0f172a)}
    .filters-card input[type="search"]:focus,.filters-card select:focus{outline:none;border-color:var(--brand,#2c6fb2);box-shadow:0 0 0 3px rgba(44,111,178,.18)}
    .filters-card .meta{margin-left:auto;text-align:right;font-size:13px;color:#64748b;display:flex;flex-direction:column;gap:.45rem;align-items:flex-end}
    .filters-card .meta .btn{padding:.45rem .75rem;font-size:.85rem}
    .filters-card .meta .btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
    .design-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .design-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(2,6,23,.08);display:flex;flex-direction:column;overflow:hidden;text-decoration:none;color:inherit}
    .design-card .thumb{aspect-ratio:1/1;background:#f8fafc}
    .design-card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .design-card .body{padding:12px;display:flex;flex-direction:column;gap:.35rem}
    .design-card .title{font-size:1rem;font-weight:600}
    .design-card .meta{display:flex;gap:.75rem;color:#64748b;font-size:.85rem}
    .muted-sm{color:#64748b;font-size:.85rem}
    .designer-empty{background:#fff;border-radius:14px;box-shadow:var(--shadow-sm,0 2px 10px rgba(2,6,23,.06));padding:1rem;text-align:center}
    .error-box{margin-top:2rem;background:#fee2e2;color:#991b1b;padding:1rem;border-radius:10px}
    @media(max-width:720px){
      .designer-designs-head{align-items:flex-start;flex-direction:column}
      .filters-card{flex-direction:column;align-items:stretch}
      .filters-card .field,.filters-card .field.half{min-width:100%;flex:1}
      .filters-card .meta{width:100%;text-align:left;align-items:flex-start;margin:0}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/"><img src="/img/logo.png" alt="Logo"/></a>
      <nav class="menu">
        <a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="/designs.html"><i class="fa-solid fa-palette"></i> Diseños</a>
      </nav>
    </div>
  </header>

  <main class="designer-wrap" aria-live="polite">
    <a id="btnBack" class="link" href="/designers.html" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:14px">
      <i class="fa-solid fa-arrow-left-long"></i> Volver
    </a>
    <section id="designerContent">
      <div class="card" style="padding:1.5rem">Cargando perfil…</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2025 Ludus Stamps. Todos los derechos reservados.</p>
      <p><a class="link" href="#contacto">Contacto</a></p>
    </div>
  </footer>

  <script src="/js/auth-ui.js" defer></script>
  <script src="/js/designer-profile.js" defer></script>
</body>
</html>
