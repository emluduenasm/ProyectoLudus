<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mis ventas · Ludus Stamps</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .sales-wrap{max-width:1100px;margin:2rem auto;padding:1rem}
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:.75rem;flex-wrap:wrap}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:separate;border-spacing:0 .5rem}
    td,th{padding:.6rem .8rem;background:#fff;vertical-align:top}
    th{color:#334155;text-align:left}
    td:first-child,th:first-child{border-top-left-radius:10px;border-bottom-left-radius:10px}
    td:last-child,th:last-child{border-top-right-radius:10px;border-bottom-right-radius:10px}
    .muted-sm{color:#64748b;font-size:.85rem}
    .right{text-align:right}
    .filters{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:.75rem}
    .filters label{display:flex;flex-direction:column;gap:.25rem;font-size:.85rem;color:#475569}
    .filters select,.filters input{min-width:140px}
    .filters button{height:42px}
    .summary{margin-bottom:1rem}
    .summary-card{background:#0b25370a;border-radius:14px;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.2rem;max-width:260px}
    .summary-card strong{font-size:1.4rem;color:#0f172a}
    .status-pill{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .7rem;border-radius:999px;font-size:.78rem;font-weight:600}
    .status-pill.pending{background:#fef3c7;color:#92400e}
    .status-pill.completed{background:#dcfce7;color:#166534}
    .status-pill.cancelled{background:#fee2e2;color:#991b1b}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/"><img src="/img/logo.png" alt="Logo"/></a>
      <nav class="menu">
        <a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="/designs.html"><i class="fa-solid fa-palette"></i> Diseños</a>
      </nav>
    </div>
  </header>

  <main class="sales-wrap">
    <h1>Mis ventas</h1>

    <nav class="admin-subnav">
      <a href="/user-profile.html" class="tab"><i class="fa-solid fa-user-gear"></i> Mi perfil</a>
      <a href="/user-orders.html" class="tab"><i class="fa-solid fa-bag-shopping"></i> Mis compras</a>
      <a href="/upload.html" class="tab"><i class="fa-solid fa-cloud-arrow-up"></i> Subir dise&ntilde;o</a>
    </nav>

    <div class="toolbar">
      <p class="muted-sm">Seguimiento de pedidos que incluyeron tus diseños.</p>
      <span id="resultInfo" class="muted-sm"></span>
    </div>

    <div class="filters">
      <label>Por página
        <select id="fLimit" class="input">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
      </label>
      <label>Producto
        <select id="fProduct" class="input">
          <option value="">Todos</option>
        </select>
      </label>
      <label>Desde
        <input type="date" id="fFrom" class="input"/>
      </label>
      <label>Hasta
        <input type="date" id="fTo" class="input"/>
      </label>
      <button id="btnFiltersClear" type="button" class="btn btn-outline"><i class="fa-solid fa-eraser"></i> Limpiar</button>
      <div class="muted-sm" id="pageInfo" style="margin-left:auto"></div>
    </div>
    <div class="summary">
      <div class="summary-card">
        <p class="muted-sm" style="margin:0">Total vendido</p>
        <strong id="totalAmount">$ 0,00</strong>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Pedido</th>
            <th>Producto / Diseño</th>
            <th>Cantidad</th>
            <th>Estado</th>
            <th>Monto</th>
            <th>Comprador</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6">Cargando…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button id="prev" class="btn">←</button>
      <button id="next" class="btn">→</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2025 Ludus Stamps. Todos los derechos reservados.</p>
      <p><a class="link" href="#contacto">Contacto</a></p>
    </div>
  </footer>

  <script src="/js/auth-ui.js" defer></script>
  <script src="/js/designer-sales.js" defer></script>
</body>
</html>
